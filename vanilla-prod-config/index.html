<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla Production Config</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5f5;
      }
      .launcher {
        background: #fff;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        width: 100%;
        max-width: 400px;
      }
      .launcher h1 {
        font-size: 1.25rem;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .launcher label {
        display: block;
        font-size: 0.875rem;
        margin-bottom: 0.25rem;
        color: #333;
      }
      .launcher input {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 1rem;
        margin-bottom: 1rem;
      }
      .launcher hr {
        border: none;
        border-top: 1px solid #eee;
        margin-bottom: 1rem;
      }
      .launcher button {
        width: 100%;
        padding: 0.7rem;
        background: #000;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        cursor: pointer;
      }
      .launcher button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .launcher .status {
        margin-top: 1rem;
        font-size: 0.85rem;
        text-align: center;
        color: #666;
      }
      .launcher .error {
        color: #c00;
      }
    </style>
  </head>
  <body>

    <div class="launcher" id="launcher">
      <h1>DashLX Production Launcher</h1>

      <label for="clientId">Client ID</label>
      <input type="text" id="clientId" placeholder="Client ID" />

      <label for="clientSecret">Client Secret</label>
      <input type="password" id="clientSecret" placeholder="Client Secret" />

      <label for="cohortId">Cohort ID</label>
      <input type="text" id="cohortId" placeholder="Cohort ID" />

      <hr />

      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="user@example.com" />

      <button id="beginBtn">Begin Session</button>
      <div class="status" id="status"></div>
    </div>

    <!-- DashLX web component (production) -->
    <dashlx-cobrand
      secondaryColor="#000000"
      redirectUri="https://calvin-7757.github.io/CobrandingComponentTest/"
    ></dashlx-cobrand>

    <script type="module" crossorigin="anonymous"
      src="https://cobranding.dashlx.com/webcomp/assets/dashlx-cobrand.js"></script>

    <script>
      const REDIRECT = 'https://calvin-7757.github.io/CobrandingComponentTest/';
      const API_BASE = 'https://api.dashlx.com/iaaa';

      const STORAGE_KEY = 'dashlx-prod-config';

      const clientIdInput    = document.getElementById('clientId');
      const clientSecretInput = document.getElementById('clientSecret');
      const cohortIdInput    = document.getElementById('cohortId');
      const emailInput       = document.getElementById('email');
      const beginBtn         = document.getElementById('beginBtn');
      const statusEl         = document.getElementById('status');
      const launcher         = document.getElementById('launcher');

      // Restore cached values
      try {
        const cached = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (cached.clientId)     clientIdInput.value     = cached.clientId;
        if (cached.clientSecret) clientSecretInput.value = cached.clientSecret;
        if (cached.cohortId)     cohortIdInput.value     = cached.cohortId;
        if (cached.email)        emailInput.value        = cached.email;
      } catch (_) {}

      // Save on input change
      function saveToCache() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          clientId:     clientIdInput.value.trim(),
          clientSecret: clientSecretInput.value.trim(),
          cohortId:     cohortIdInput.value.trim(),
          email:        emailInput.value.trim()
        }));
      }
      [clientIdInput, clientSecretInput, cohortIdInput, emailInput].forEach(
        el => el.addEventListener('input', saveToCache)
      );

      beginBtn.addEventListener('click', async () => {
        const clientId     = clientIdInput.value.trim();
        const clientSecret = clientSecretInput.value.trim();
        const cohortId     = cohortIdInput.value.trim();
        const email        = emailInput.value.trim();

        if (!clientId || !clientSecret || !cohortId || !email) {
          statusEl.textContent = 'Please fill in all fields.';
          statusEl.classList.add('error');
          return;
        }

        statusEl.textContent = 'Starting session…';
        statusEl.classList.remove('error');
        beginBtn.disabled = true;

        try {
          const res = await fetch(`${API_BASE}/begin-session`, {
            method: 'POST',
            headers: {
              'Authorization': 'Basic ' + btoa(clientId + ':' + clientSecret),
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: email,
              token: clientSecret,
              cohort: cohortId,
              redirect_uri: REDIRECT
            })
          });

          if (!res.ok) {
            throw new Error(`HTTP ${res.status}: ${await res.text()}`);
          }

          const data = await res.json();
          const sessionId = data.session_id;

          statusEl.textContent = 'Session started. Activating component…';
          launcher.style.display = 'none';

          document.dispatchEvent(
            new CustomEvent('dashlx-activate-component', {
              detail: { sessionId }
            })
          );
        } catch (err) {
          statusEl.textContent = err.message;
          statusEl.classList.add('error');
          beginBtn.disabled = false;
        }
      });

      document.addEventListener('dashlx-activation-success', (e) => {
        console.log('Activation success:', e.detail);
      });
      document.addEventListener('dashlx-session-expired', () => {
        console.log('Session expired');
      });
      document.addEventListener('dashlx-flow-completed', (e) => {
        console.log('Flow completed:', e.detail);
      });
    </script>
  </body>
</html>
